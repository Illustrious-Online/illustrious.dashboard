name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  pull-requests: write
  statuses: write

jobs:
  cla_assistant:
    runs-on: ubuntu-latest
    if: |
      (github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
      (github.event_name == 'pull_request_target' && github.event.action != 'closed')
    steps:
      - uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_ASSISTANT_PAT }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/Illustrious-Online/.github/blob/main/CLA.md
          branch: main
          allowlist: b3kN,3ncinasv3,bot*
          remote-organization-name: Illustrious-Online
          remote-repo-name: .github
          create-file-commit-message: chore(cla): add cla signatures file
          signed-commit-message: chore(cla): $contributorName signed the CLA
          custom-notsigned-prcomment: |
            Thank you for your contribution to Illustrious! 🎉

            Before we can merge this pull request, please sign our **[Contributor License Agreement](https://github.com/Illustrious-Online/.github/blob/main/CLA.md)**.

            To sign, please post the following comment on this PR:

            > I have read the CLA Document and I hereby sign the CLA

            The CLA grants Illustrious the rights needed to include your contribution in both the open-source Community Edition and the hosted Illustrious Online service. You retain full copyright of your work.
          custom-signed-prcomment: |
            ✅ Thank you for signing the Illustrious CLA! Your contribution can now be reviewed for merge.
